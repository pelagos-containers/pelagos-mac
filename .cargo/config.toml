# Cargo workspace configuration for pelagos-mac.
#
# Host (macOS):
#   cargo build -p pelagos-mac --release
#
# Guest (Linux ARM64) — built natively in the build VM, not cross-compiled:
#   pelagos --profile build vm ssh -- \
#     'cd /mnt/Projects/pelagos-mac && cargo build --target aarch64-unknown-linux-musl --release -p pelagos-guest'
#
# See scripts/full-rebuild.sh for the complete build pipeline.

# macOS host builds default to the native target.
[build]
target = "aarch64-apple-darwin"
